name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DIGITALOCEAN_HOST }}
          username: root
          key: ${{ secrets.DIGITALOCEAN_SSH_KEY }}
          script: |
            cd /opt/youtube-automation/football-pulse
            git pull origin main
            docker compose up -d --build
            docker compose ps
            docker inspect --format='{{.State.Health.Status}}' football-autonews

      - name: Verify deployed container health
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DIGITALOCEAN_HOST }}
          username: root
          key: ${{ secrets.DIGITALOCEAN_SSH_KEY }}
          script: |
            cd /opt/youtube-automation/football-pulse
            for i in 1 2 3 4 5 6; do
              status=$(docker inspect --format='{{.State.Health.Status}}' football-autonews)
              echo "health=$status"
              if [ "$status" = "healthy" ]; then
                exit 0
              fi
              sleep 10
            done
            docker compose ps
            docker compose logs --tail=200 autonews
            exit 1
