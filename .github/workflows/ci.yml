name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg libcairo2

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: python -m pytest -q tests

      - name: Verify runtime imports
        run: |
          python -c "import core.database; print('core.database ok')"
          python -c "import publish.thumbnail; print('publish.thumbnail ok')"
          python -c "import process.video_maker; print('process.video_maker ok')"
          python -c "import pipeline.daily_runner; print('pipeline.daily_runner ok')"

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t youtube-automation:ci .
