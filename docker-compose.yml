services:
  autonews:
    build: .
    container_name: football-autonews
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./database:/app/database
      - ./temp:/app/temp
      - ./logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
